<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hot Wheels Product | Diecastdrift's Catalogue</title>
  <meta name="description" content="Hot Wheels product details page.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Manrope:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="topbar">
    <p>Trusted Hot Wheels Seller | Secure Packing | PAN India Shipping</p>
  </div>

  <header class="header">
    <a href="index.html#home" class="logo">
      <img class="logo-mark" src="images/diecastdrift-logo.png" alt="Diecastdrift logo">
      <span class="logo-text">
        <span>Diecastdrift's</span>
        <strong>Catalogue</strong>
      </span>
    </a>
    <a class="btn-secondary" href="index.html#hotwheels">Back To Collection</a>
  </header>

  <main>
    <section class="product-detail" id="productDetail"></section>
    <section class="section">
      <div class="section-head">
        <h2>You May Also Like</h2>
      </div>
      <div class="mini-grid" id="relatedGrid"></div>
    </section>
  </main>

  <a id="floatingCartBtn" class="floating-cart" href="index.html?openCart=1#hotwheels" aria-label="View cart" hidden>
    <span class="floating-cart-text">
      <span class="floating-cart-main">View cart</span>
      <span id="floatingCartCount" class="floating-cart-sub">0 items</span>
    </span>
    <span class="floating-cart-arrow" aria-hidden="true"></span>
  </a>

  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="product.js"></script>
</body>
</html>
